<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXカウンター</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>EXカウンター</h1>
        <div class="header-menu">
            <button class="btn-hamburger" id="hamburger-btn" aria-label="メニュー">
                <span></span><span></span><span></span>
            </button>
        </div>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
    </header>
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <nav class="sidebar" id="sidebar">
        <button class="dropdown-item" id="export-btn">データをバックアップ</button>
        <button class="dropdown-item" id="import-btn">データを復元</button>
        <hr class="dropdown-divider">
        <button class="dropdown-item" id="changelog-btn">更新履歴</button>
        <div class="sidebar-author">あんず</div>
    </nav>
    <main>
        <section id="tabs-container">
            <div class="tabs-list-wrapper">
                <ul id="tabs-list" class="tabs-list">
                    <!-- タブがここに追加される -->
                </ul>
            </div>
            <div id="tabs-content" class="tabs-content">
                <!-- タブの内容がここに表示される -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
